<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post &middot; Hyun Mog Kim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .post-body { max-width: 720px; color: var(--text); font-size: 1rem; line-height: 1.8; }
        .post-body h1 { font-family: 'DM Serif Display', serif; font-size: 2.2rem; font-weight: 400; line-height: 1.2; margin: 0 0 0.5rem; letter-spacing: -0.015em; }
        .post-body h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; font-weight: 400; margin: 2.2rem 0 0.8rem; }
        .post-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1.8rem 0 0.6rem; color: var(--text); }
        .post-body p { margin: 0 0 1.1rem; color: var(--text-muted); }
        .post-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
        .post-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; background: var(--accent-light); padding: 0.1em 0.4em; border-radius: 4px; color: var(--text); }
        .post-body pre { background: #1a2332; color: #e2e8ee; padding: 1.1rem 1.25rem; border-radius: 8px; overflow-x: auto; margin: 1.2rem 0; font-size: 0.85rem; }
        .post-body pre code { background: none; padding: 0; color: inherit; }
        .post-body blockquote { border-left: 3px solid var(--accent); padding: 0.2rem 0 0.2rem 1rem; margin: 1.2rem 0; color: var(--text-muted); font-style: italic; }
        .post-body ul, .post-body ol { margin: 0 0 1.1rem 1.4rem; color: var(--text-muted); }
        .post-body li { margin-bottom: 0.4rem; }
        .post-body img { max-width: 100%; border-radius: 8px; margin: 1.2rem 0; }
        .post-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 2.5rem; }
        .post-back { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--text-muted); text-decoration: none; margin-bottom: 2rem; }
        .post-back:hover { color: var(--accent); }
    </style>
</head>
<body>

<nav>
    <div class="container">
        <a href="index.html" class="nav-logo">HMK<span>.</span></a>
        <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
        <div class="nav-links">
            <a href="index.html#education">Education</a>
            <a href="index.html#research">Research</a>
            <a href="index.html#experience">Experience</a>
            <a href="index.html#projects">Projects</a>
            <a href="blog.html">Blog</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </div>
</nav>

<section style="padding-top: 8rem;">
    <div class="container">
        <a href="blog.html" class="post-back">&larr; All posts</a>
        <article class="post-body" id="post"></article>
    </div>
</section>

<footer>
    <div class="container">
        <p>&copy; 2026 Hyun Mog Kim</p>
    </div>
</footer>

<script>
window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
    svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>
<script>
const params = new URLSearchParams(window.location.search);
const slug = (params.get('slug') || '').replace(/[^a-zA-Z0-9_\-]/g, '');
const target = document.getElementById('post');

if (!slug) {
    target.innerHTML = '<p>No post specified. <a href="blog.html">Back to blog</a>.</p>';
} else {
    Promise.all([
        fetch('posts/index.json').then(r => r.json()),
        fetch(`posts/${slug}.md`).then(r => { if (!r.ok) throw new Error('not found'); return r.text(); })
    ]).then(([index, md]) => {
        const meta = index.find(p => p.slug === slug);
        if (meta) {
            document.title = `${meta.title} · Hyun Mog Kim`;
        }
        const html = marked.parse(md);
        const dateLine = meta ? `<p class="post-meta">${meta.date}</p>` : '';
        target.innerHTML = dateLine + html;
        if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise([target]);
        }
    }).catch(() => {
        target.innerHTML = '<p>Could not load this post. <a href="blog.html">Back to blog</a>.</p>';
    });
}
</script>

</body>
</html>
